apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pape-siriman-cissoko
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pvpiboy11/gitops-pape-siriman-cissoko.git
    targetRevision: main
    path: charts/pape-siriman-cissoko
  destination:
    server: https://kubernetes.default.svc
    namespace: pape-siriman-cissoko
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true